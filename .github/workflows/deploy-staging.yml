name: Deploy Staging

concurrency:
  group: production-deploy-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - master

jobs:
  build-documentserver:
    name: Build DocumentServer
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: rg.fr-par.scw.cloud
          username: nologin
          password: ${{ secrets.SCALEWAY_GCP_KEY }}

      - name: Build & Push Docker image (DocumentServer)
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: rg.fr-par.scw.cloud/scriptor/devana-documentserver-staging:${{ github.sha }}, rg.fr-par.scw.cloud/scriptor/devana-documentserver-staging:latest
          cache-from: type=gha,scope=devana-documentserver
          cache-to: type=gha,scope=devana-documentserver,mode=max

  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    needs: [build-documentserver]

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Rollout restart
        uses: actions-hub/kubectl@master
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        with:
          args: rollout restart deployment/devana-documentserver -n devana-staging

      - name: Wait for devana-documentserver
        uses: actions-hub/kubectl@master
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        with:
          args: rollout status deployment/devana-documentserver -n devana-staging --timeout=300s
